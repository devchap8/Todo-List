<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
</head>
<body>
    <div class="homepage">
        <button class="addTaskButton">+</button>
        <div class="homepageHeader">
            <div class="homepageHeaderText">TODO</div>
        </div>
        <div class="homepageSidebar">
            <div class="sidebarTitle">Sort Tasks</div>
            <button class="sidebarItem sidebarAll">All</button>
            <button class="sidebarItem sidebarToday">Today</button>
            <button class="sidebarItem sidebarThisWeek">This Week</button>
            <button class="sidebarItem sidebarImportant">Important</button>
            <div class="sidebarTitle">Projects</div>
            <div class="sidebarProjects">

            </div>
            <button class="newProjectButton sidebarItem">New Project</button>
            <button class="deleteProjectButton sidebarItem">Delete Project</button>
        </div>
        <div class="homepageMain">
            <div class="homepageMainTitle">All</div>
            <div class="taskDisplay">
            </div>
        </div>
    </div>
    <div class="addTaskScreen addScreen hidden">
        <form action="" method="set" id="addTaskForm">
            <div class="formTitle">New Task</div>
            <label for="taskName">
                <span>Task Name</span>
                <input type="text" id="taskName" name="taskName" placeholder="" required>
            </label>
            <label for="taskDate">
                <span>Due Date</span>
                <input type="date" id="taskDate" name="taskDate" placeholder="" required>
            </label>
            <label for="taskDescription">
                <span>Description</span>
                <input type="text" id="taskDescription" name="taskDescription" placeholder="">
            </label>
            <label for="taskPriority">
                <span>Priority</span>
                <input type="number" min="1" max="5" id="taskPriority" name="taskPriority" placeholder="5" required>
            </label>
            <label for="taskProjectSelect">
                <span>Project</span>
                <select name="taskProjectSelect" id="taskProjectSelect">

                </select>
            </label>
            <input type="submit" value="Add Task" class="submitTaskButton">
        </form>
    </div>
    <div class="editTaskScreen addScreen hidden">
        <form action="" method="get" class="editTaskForm" id="editTaskForm">
            <div class="formTitle">Edit Task</div>
            <label for="editTaskName">
                <span>Task Name</span>
                <input type="text" id="editTaskName" name="editTaskName" placeholder="" required>
            </label>
            <label for="editTaskDate">
                <span>Due Date</span>
                <input type="date" id="editTaskDate" name="editTaskDate" placeholder="" required>
            </label>
            <label for="editTaskDescription">
                <span>Description</span>
                <input type="text" id="editTaskDescription" name="editTaskDescription" placeholder="">
            </label>
            <label for="editTaskPriority">
                <span>Priority</span>
                <input type="number" min="1" max="5" id="editTaskPriority" name="editTaskPriority" placeholder="5" required>
            </label>
            <label for="editTaskProjectSelect">
                <span>Project</span>
                <select name="editTaskProjectSelect" id="editTaskProjectSelect">

                </select>
            </label>
            <input type="submit" value="Confirm Edit" class="submitEditTaskButton">
        </form>
    </div>
    <div class="addProjectScreen addScreen hidden">
        <form action="" method="set">
            <div class="formTitle">New Project</div>
            <label for="projectName">
                <div>Project Name</div>
                <input type="text" id="projectName" name="projectName" placeholder="" required>
            </label>
            <input type="submit" value="Add Project">
        </form>
    </div>
    <div class="deleteProjectScreen addScreen hidden">
        <form action="" method="set">
            <div class="formTitle">Remove Project</div>
            <label for="deleteProjectSelect">
                <div>Project</div>
                <div>
                    <select name="deleteProjectSelect" id="deleteProjectSelect">
                    </select>
                </div>
            </label>
            <input type="submit" value="Delete Project">
        </form>
    </div>
    <div class="taskInfoScreen hidden">
        <div class="taskID hidden"></div>
        <div class="taskInfoTop">
            <span>Task Name</span>
            <button class="editTaskButton">Edit Task</button>
            <button class="deleteTaskButton">Delete Task</button>
        </div>
        <div class="taskInfoMiddle">
            <span class="taskInfoDueDate">Due 01/01/2026</span>
            <span class="taskInfoProjectName">Project 1</span>
            <span class="taskInfoPriority">Priority: 1</span>
        </div>
        <div class="taskInfoBottom">
            <div>Description:</div>
            <div class="taskInfoDescription">...</div>
        </div>
    </div>
</body>
</html>
